version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ag
      POSTGRES_PASSWORD: agpass
      POSTGRES_DB: agdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: quay.io/minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: ag_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pg_data: {}
  minio_data: {}

